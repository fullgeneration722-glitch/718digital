services:
  - type: web
    name: 718digital-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MISTRAL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
